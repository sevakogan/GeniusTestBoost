<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoices - GeniusTestBoost</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="dash-nav">
    <div class="dash-nav-inner">
      <a href="/dashboard" class="dash-logo">Genius<span>TestBoost</span></a>
      <div class="dash-nav-right">
        <a href="/dashboard" class="dash-nav-link">Dashboard</a>
        <a href="/messages" class="dash-nav-link">Messages</a>
        <button id="logoutBtn" class="btn-ghost-sm">Sign Out</button>
      </div>
    </div>
  </nav>

  <main class="dash-main">
    <div class="breadcrumb">
      <a href="/dashboard">Dashboard</a> / <span>Invoices</span>
    </div>

    <!-- Create Invoice -->
    <section class="dash-section">
      <h2>Create Invoice</h2>
      <div class="invoice-form-card">
        <form id="invoiceForm">
          <div class="form-row">
            <div class="form-group">
              <label>Customer Email *</label>
              <input type="email" id="custEmail" class="input" placeholder="student@example.com" required>
            </div>
            <div class="form-group">
              <label>Customer Name</label>
              <input type="text" id="custName" class="input" placeholder="John Doe">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Amount (USD) *</label>
              <input type="number" id="amount" class="input" step="0.01" min="1" placeholder="150.00" required>
            </div>
            <div class="form-group">
              <label>Due Date</label>
              <input type="date" id="dueDate" class="input">
            </div>
          </div>
          <div class="form-group">
            <label>Description</label>
            <input type="text" id="description" class="input" placeholder="Test Prep Tutoring - April 2026">
          </div>
          <div id="invoiceError" class="error-message"></div>
          <button type="submit" class="btn-primary" id="createBtn">Create Invoice</button>
        </form>
      </div>
    </section>

    <!-- Invoice List -->
    <section class="dash-section">
      <h2>All Invoices</h2>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Customer</th>
              <th>Description</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Due Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="invoicesBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    let currentUser = null;

    async function init() {
      const res = await fetch('/api/user', { credentials: 'include' });
      if (!res.ok) { window.location.href = '/login'; return; }
      currentUser = await res.json();
      await loadInvoices();
    }

    async function loadInvoices() {
      const res = await fetch('/api/invoices', { credentials: 'include' });
      if (!res.ok) return;
      const invoices = await res.json();
      const tbody = document.getElementById('invoicesBody');
      tbody.textContent = '';

      if (!invoices.length) {
        const tr = document.createElement('tr');
        const td = document.createElement('td');
        td.colSpan = 6;
        td.className = 'empty-msg';
        td.textContent = 'No invoices yet. Create your first one above.';
        tr.appendChild(td);
        tbody.appendChild(tr);
        return;
      }

      invoices.forEach(inv => {
        const tr = document.createElement('tr');

        const tdCustomer = document.createElement('td');
        const nameEl = document.createElement('strong');
        nameEl.textContent = inv.customer_name || '';
        const emailEl = document.createElement('small');
        emailEl.textContent = inv.customer_email;
        emailEl.style.display = 'block';
        emailEl.style.opacity = '0.6';
        tdCustomer.appendChild(nameEl);
        tdCustomer.appendChild(emailEl);

        const tdDesc = document.createElement('td');
        tdDesc.textContent = inv.description || '';

        const tdAmount = document.createElement('td');
        tdAmount.textContent = '$' + (inv.amount / 100).toFixed(2);
        tdAmount.style.fontWeight = '600';

        const tdStatus = document.createElement('td');
        const statusSpan = document.createElement('span');
        statusSpan.className = 'status-pill ' + inv.status;
        statusSpan.textContent = inv.status.charAt(0).toUpperCase() + inv.status.slice(1);
        tdStatus.appendChild(statusSpan);

        const tdDue = document.createElement('td');
        tdDue.textContent = inv.due_date ? new Date(inv.due_date).toLocaleDateString() : '-';

        const tdActions = document.createElement('td');
        tdActions.className = 'action-cell';

        if (inv.status === 'draft') {
          const sendBtn = document.createElement('button');
          sendBtn.className = 'btn-primary-sm';
          sendBtn.textContent = 'Send';
          sendBtn.addEventListener('click', () => sendInvoice(inv.id));
          tdActions.appendChild(sendBtn);

          const voidBtn = document.createElement('button');
          voidBtn.className = 'btn-danger-sm';
          voidBtn.textContent = 'Void';
          voidBtn.addEventListener('click', () => voidInvoice(inv.id));
          tdActions.appendChild(voidBtn);
        }

        if (inv.status === 'sent' && inv.stripe_hosted_url) {
          const linkBtn = document.createElement('a');
          linkBtn.className = 'btn-ghost-sm';
          linkBtn.textContent = 'View';
          linkBtn.href = inv.stripe_hosted_url;
          linkBtn.target = '_blank';
          linkBtn.rel = 'noopener';
          tdActions.appendChild(linkBtn);

          const voidBtn = document.createElement('button');
          voidBtn.className = 'btn-danger-sm';
          voidBtn.textContent = 'Void';
          voidBtn.addEventListener('click', () => voidInvoice(inv.id));
          tdActions.appendChild(voidBtn);
        }

        if (inv.status === 'paid') {
          const paidSpan = document.createElement('span');
          paidSpan.style.color = '#27ae60';
          paidSpan.style.fontWeight = '600';
          paidSpan.textContent = 'Paid';
          tdActions.appendChild(paidSpan);
        }

        tr.appendChild(tdCustomer);
        tr.appendChild(tdDesc);
        tr.appendChild(tdAmount);
        tr.appendChild(tdStatus);
        tr.appendChild(tdDue);
        tr.appendChild(tdActions);
        tbody.appendChild(tr);
      });
    }

    document.getElementById('invoiceForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('invoiceError');
      errEl.classList.remove('visible');
      const btn = document.getElementById('createBtn');
      btn.textContent = 'Creating...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/invoices', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            customer_email: document.getElementById('custEmail').value,
            customer_name: document.getElementById('custName').value,
            amount: document.getElementById('amount').value,
            due_date: document.getElementById('dueDate').value || undefined,
            description: document.getElementById('description').value
          })
        });

        const result = await res.json();
        if (res.ok && result.success) {
          document.getElementById('invoiceForm').reset();
          await loadInvoices();
        } else {
          errEl.textContent = result.error || result.details || 'Failed to create invoice';
          errEl.classList.add('visible');
        }
      } catch (err) {
        errEl.textContent = 'Something went wrong. Please try again.';
        errEl.classList.add('visible');
      }

      btn.textContent = 'Create Invoice';
      btn.disabled = false;
    });

    async function sendInvoice(id) {
      if (!confirm('Send this invoice to the customer?')) return;
      const res = await fetch('/api/invoices/' + id + '/send', {
        method: 'POST',
        credentials: 'include'
      });
      const result = await res.json();
      if (res.ok) {
        await loadInvoices();
      } else {
        alert(result.error || 'Failed to send invoice');
      }
    }

    async function voidInvoice(id) {
      if (!confirm('Void this invoice? This cannot be undone.')) return;
      const res = await fetch('/api/invoices/' + id + '/void', {
        method: 'POST',
        credentials: 'include'
      });
      if (res.ok) {
        await loadInvoices();
      } else {
        const result = await res.json();
        alert(result.error || 'Failed to void invoice');
      }
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/auth/sign-out', { method: 'POST', credentials: 'include' });
      window.location.href = '/login';
    });

    init();
  </script>
</body>
</html>
