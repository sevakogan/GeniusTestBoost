<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoices - GeniusTestBoost</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="dash-nav">
    <div class="dash-nav-inner">
      <a href="/dashboard" class="dash-logo">Genius<span>TestBoost</span></a>
      <div class="dash-nav-right">
        <a href="/dashboard" class="dash-nav-link">Dashboard</a>
        <a href="/messages" class="dash-nav-link">Messages</a>
        <button id="logoutBtn" class="btn-ghost-sm">Sign Out</button>
      </div>
    </div>
  </nav>

  <main class="dash-main">
    <div class="breadcrumb">
      <a href="/dashboard">Dashboard</a> / <span>Invoices</span>
    </div>

    <!-- Create Invoice -->
    <section class="dash-section">
      <h2>Create Invoice</h2>
      <div class="invoice-form-card">
        <form id="invoiceForm">
          <div class="form-row">
            <div class="form-group">
              <label>Student Email *</label>
              <input type="email" id="custEmail" class="input" placeholder="student@example.com" required>
            </div>
            <div class="form-group">
              <label>Student Name</label>
              <input type="text" id="custName" class="input" placeholder="John Doe">
            </div>
          </div>

          <div class="form-group">
            <label>Session Description</label>
            <input type="text" id="description" class="input" placeholder="SAT Math Prep">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Number of Hours *</label>
              <input type="number" id="hours" class="input" step="0.5" min="0.5" placeholder="5" required>
            </div>
            <div class="form-group">
              <label>Rate per Hour ($) *</label>
              <input type="number" id="ratePerHour" class="input" step="0.01" min="1" placeholder="75.00" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Extra Fee ($)</label>
              <input type="number" id="extraFee" class="input" step="0.01" min="0" placeholder="0.00">
            </div>
            <div class="form-group">
              <label>Fee Label</label>
              <input type="text" id="extraFeeLabel" class="input" placeholder="Materials / Registration">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Discount ($)</label>
              <input type="number" id="discount" class="input" step="0.01" min="0" placeholder="0.00">
            </div>
            <div class="form-group">
              <label>Discount Label</label>
              <input type="text" id="discountLabel" class="input" placeholder="Multi-session discount">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Due Date</label>
              <input type="date" id="dueDate" class="input">
            </div>
            <div class="form-group" style="display:flex;align-items:center;gap:10px;padding-top:24px">
              <input type="checkbox" id="passFee" style="width:18px;height:18px">
              <label for="passFee" style="margin:0;cursor:pointer">Pass processing fee to student</label>
            </div>
          </div>

          <!-- Live Total Preview -->
          <div class="invoice-preview-totals" id="totalsPreview">
            <div class="preview-line"><span>Subtotal</span><span id="prevSubtotal">$0.00</span></div>
            <div class="preview-line" id="prevExtraRow" style="display:none"><span id="prevExtraLabel">Extra Fee</span><span id="prevExtra">$0.00</span></div>
            <div class="preview-line discount" id="prevDiscountRow" style="display:none"><span id="prevDiscountLabel">Discount</span><span id="prevDiscount">-$0.00</span></div>
            <div class="preview-line" id="prevFeeRow" style="display:none"><span>Processing Fee</span><span id="prevFee">$0.00</span></div>
            <div class="preview-line total"><span>Total</span><span id="prevTotal">$0.00</span></div>
          </div>

          <div id="invoiceError" class="error-message"></div>
          <button type="submit" class="btn-primary" id="createBtn">Create Invoice</button>
        </form>
      </div>
    </section>

    <!-- Invoice List -->
    <section class="dash-section">
      <h2>All Invoices</h2>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Student</th>
              <th>Description</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Due</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="invoicesBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    let currentUser = null;

    async function init() {
      const res = await fetch('/api/user', { credentials: 'include' });
      if (!res.ok) { window.location.href = '/login'; return; }
      currentUser = await res.json();

      // Set default due date to 30 days from now
      const d = new Date();
      d.setDate(d.getDate() + 30);
      document.getElementById('dueDate').value = d.toISOString().split('T')[0];

      setupLivePreview();
      await loadInvoices();
    }

    function setupLivePreview() {
      const fields = ['hours', 'ratePerHour', 'extraFee', 'discount', 'passFee'];
      fields.forEach(id => {
        const el = document.getElementById(id);
        el.addEventListener('input', updatePreview);
        el.addEventListener('change', updatePreview);
      });
      document.getElementById('extraFeeLabel').addEventListener('input', updatePreview);
      document.getElementById('discountLabel').addEventListener('input', updatePreview);
    }

    function updatePreview() {
      const hours = parseFloat(document.getElementById('hours').value) || 0;
      const rate = parseFloat(document.getElementById('ratePerHour').value) || 0;
      const extra = parseFloat(document.getElementById('extraFee').value) || 0;
      const disc = parseFloat(document.getElementById('discount').value) || 0;
      const passFee = document.getElementById('passFee').checked;

      const subtotal = hours * rate;
      const preTotal = subtotal + extra - disc;

      let fee = 0;
      if (passFee && preTotal > 0) {
        fee = preTotal * 0.029 + 0.30;
      }
      const total = preTotal + fee;

      document.getElementById('prevSubtotal').textContent = '$' + subtotal.toFixed(2);

      const extraRow = document.getElementById('prevExtraRow');
      if (extra > 0) {
        extraRow.style.display = '';
        document.getElementById('prevExtra').textContent = '$' + extra.toFixed(2);
        document.getElementById('prevExtraLabel').textContent = document.getElementById('extraFeeLabel').value || 'Extra Fee';
      } else {
        extraRow.style.display = 'none';
      }

      const discRow = document.getElementById('prevDiscountRow');
      if (disc > 0) {
        discRow.style.display = '';
        document.getElementById('prevDiscount').textContent = '-$' + disc.toFixed(2);
        document.getElementById('prevDiscountLabel').textContent = document.getElementById('discountLabel').value || 'Discount';
      } else {
        discRow.style.display = 'none';
      }

      const feeRow = document.getElementById('prevFeeRow');
      if (fee > 0) {
        feeRow.style.display = '';
        document.getElementById('prevFee').textContent = '$' + fee.toFixed(2);
      } else {
        feeRow.style.display = 'none';
      }

      document.getElementById('prevTotal').textContent = '$' + total.toFixed(2);
    }

    async function loadInvoices() {
      const res = await fetch('/api/invoices', { credentials: 'include' });
      if (!res.ok) return;
      const invoices = await res.json();
      const tbody = document.getElementById('invoicesBody');
      tbody.textContent = '';

      if (!invoices.length) {
        const tr = document.createElement('tr');
        const td = document.createElement('td');
        td.colSpan = 7;
        td.className = 'empty-msg';
        td.textContent = 'No invoices yet. Create your first one above.';
        tr.appendChild(td);
        tbody.appendChild(tr);
        return;
      }

      invoices.forEach(inv => {
        const tr = document.createElement('tr');
        tr.style.cursor = 'pointer';
        tr.addEventListener('click', (e) => {
          if (e.target.tagName === 'BUTTON' || e.target.tagName === 'A') return;
          window.location.href = '/invoice/' + inv.id;
        });

        const tdNum = document.createElement('td');
        tdNum.textContent = '#' + String(inv.invoice_number).padStart(4, '0');
        tdNum.style.fontWeight = '600';
        tdNum.style.opacity = '0.6';

        const tdCustomer = document.createElement('td');
        const nameEl = document.createElement('strong');
        nameEl.textContent = inv.customer_name || inv.customer_email;
        tdCustomer.appendChild(nameEl);

        const tdDesc = document.createElement('td');
        tdDesc.textContent = inv.description || '';
        tdDesc.style.maxWidth = '200px';
        tdDesc.style.overflow = 'hidden';
        tdDesc.style.textOverflow = 'ellipsis';
        tdDesc.style.whiteSpace = 'nowrap';

        const tdAmount = document.createElement('td');
        tdAmount.textContent = '$' + (inv.total / 100).toFixed(2);
        tdAmount.style.fontWeight = '600';

        const tdStatus = document.createElement('td');
        const statusSpan = document.createElement('span');
        statusSpan.className = 'status-pill ' + inv.status;
        statusSpan.textContent = inv.status.charAt(0).toUpperCase() + inv.status.slice(1);
        tdStatus.appendChild(statusSpan);

        const tdDue = document.createElement('td');
        tdDue.textContent = inv.due_date ? new Date(inv.due_date).toLocaleDateString() : '-';

        const tdActions = document.createElement('td');
        tdActions.className = 'action-cell';

        if (inv.status === 'draft') {
          const sendBtn = document.createElement('button');
          sendBtn.className = 'btn-primary-sm';
          sendBtn.textContent = 'Send';
          sendBtn.addEventListener('click', (e) => { e.stopPropagation(); sendInvoice(inv.id); });
          tdActions.appendChild(sendBtn);

          const voidBtn = document.createElement('button');
          voidBtn.className = 'btn-danger-sm';
          voidBtn.textContent = 'Void';
          voidBtn.addEventListener('click', (e) => { e.stopPropagation(); voidInvoice(inv.id); });
          tdActions.appendChild(voidBtn);
        }

        if (inv.status === 'sent' && inv.stripe_hosted_url) {
          const linkBtn = document.createElement('a');
          linkBtn.className = 'btn-ghost-sm';
          linkBtn.textContent = 'Pay Link';
          linkBtn.href = inv.stripe_hosted_url;
          linkBtn.target = '_blank';
          linkBtn.rel = 'noopener';
          linkBtn.addEventListener('click', (e) => e.stopPropagation());
          tdActions.appendChild(linkBtn);
        }

        tr.appendChild(tdNum);
        tr.appendChild(tdCustomer);
        tr.appendChild(tdDesc);
        tr.appendChild(tdAmount);
        tr.appendChild(tdStatus);
        tr.appendChild(tdDue);
        tr.appendChild(tdActions);
        tbody.appendChild(tr);
      });
    }

    document.getElementById('invoiceForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('invoiceError');
      errEl.classList.remove('visible');
      const btn = document.getElementById('createBtn');
      btn.textContent = 'Creating...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/invoices', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            customer_email: document.getElementById('custEmail').value,
            customer_name: document.getElementById('custName').value,
            description: document.getElementById('description').value,
            hours: document.getElementById('hours').value,
            rate_per_hour: document.getElementById('ratePerHour').value,
            extra_fee: document.getElementById('extraFee').value || '0',
            extra_fee_label: document.getElementById('extraFeeLabel').value,
            discount: document.getElementById('discount').value || '0',
            discount_label: document.getElementById('discountLabel').value,
            pass_merchant_fee: document.getElementById('passFee').checked,
            due_date: document.getElementById('dueDate').value || undefined,
          })
        });

        const result = await res.json();
        if (res.ok && result.success) {
          document.getElementById('invoiceForm').reset();
          // Reset due date
          const d = new Date();
          d.setDate(d.getDate() + 30);
          document.getElementById('dueDate').value = d.toISOString().split('T')[0];
          updatePreview();
          await loadInvoices();
        } else {
          errEl.textContent = result.error || result.details || 'Failed to create invoice';
          errEl.classList.add('visible');
        }
      } catch (err) {
        errEl.textContent = 'Something went wrong. Please try again.';
        errEl.classList.add('visible');
      }

      btn.textContent = 'Create Invoice';
      btn.disabled = false;
    });

    async function sendInvoice(id) {
      if (!confirm('Send this invoice to the student?')) return;
      const res = await fetch('/api/invoices/' + id + '/send', { method: 'POST', credentials: 'include' });
      const result = await res.json();
      if (res.ok) { await loadInvoices(); }
      else { alert(result.error || 'Failed to send'); }
    }

    async function voidInvoice(id) {
      if (!confirm('Void this invoice? This cannot be undone.')) return;
      const res = await fetch('/api/invoices/' + id + '/void', { method: 'POST', credentials: 'include' });
      if (res.ok) { await loadInvoices(); }
      else { const r = await res.json(); alert(r.error || 'Failed to void'); }
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/auth/sign-out', { method: 'POST', credentials: 'include' });
      window.location.href = '/login';
    });

    init();
  </script>
</body>
</html>
