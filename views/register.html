<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - GeniusTestBoost</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="logo">
      <h1>GeniusTestBoost</h1>
      <p>Create your account</p>
    </div>

    <div class="error-message" id="errorMsg"></div>

    <!-- Google Sign-Up -->
    <button type="button" class="btn btn-google" onclick="googleSignUp()">
      <svg width="18" height="18" viewBox="0 0 18 18" style="margin-right:8px;vertical-align:middle">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      Continue with Google
    </button>

    <div class="auth-divider">
      <span>or register with email</span>
    </div>

    <form id="registerForm">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" name="firstName" placeholder="John" required>
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" name="lastName" placeholder="Doe" required>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@school.edu" required>
      </div>

      <div class="form-group">
        <label for="role">I am a</label>
        <select id="role" name="role">
          <option value="student">Student</option>
          <option value="teacher">Teacher</option>
        </select>
        <small class="role-note hidden" id="teacherNote">Teacher accounts require admin approval before you can create courses.</small>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="At least 6 characters" required minlength="6">
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat your password" required>
      </div>

      <button type="submit" class="btn btn-primary" id="registerBtn">Create Account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('registerForm');
    const errorMsg = document.getElementById('errorMsg');
    const registerBtn = document.getElementById('registerBtn');

    async function googleSignUp() {
      try {
        const res = await fetch('/api/auth/sign-in/social', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ provider: 'google', callbackURL: '/dashboard' }),
          credentials: 'include'
        });
        const data = await res.json();
        if (data.url) {
          window.location.href = data.url;
        } else {
          errorMsg.textContent = data.message || 'Google sign-up failed';
          errorMsg.classList.add('visible');
        }
      } catch (err) {
        errorMsg.textContent = 'Google sign-up failed. Please try again.';
        errorMsg.classList.add('visible');
      }
    }

    // Show teacher note when teacher role is selected
    document.getElementById('role').addEventListener('change', (e) => {
      const note = document.getElementById('teacherNote');
      if (e.target.value === 'teacher') note.classList.remove('hidden');
      else note.classList.add('hidden');
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.remove('visible');

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        errorMsg.textContent = 'Passwords do not match.';
        errorMsg.classList.add('visible');
        return;
      }

      registerBtn.textContent = 'Creating account...';
      registerBtn.disabled = true;

      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;

      try {
        const res = await fetch('/api/auth/sign-up/email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: firstName + ' ' + lastName,
            email: document.getElementById('email').value,
            password: password,
            firstName: firstName,
            lastName: lastName,
            role: document.getElementById('role').value
          }),
          credentials: 'include'
        });

        const result = await res.json();

        if (res.ok && result.token) {
          window.location.href = '/dashboard';
        } else {
          errorMsg.textContent = result.message || result.error || 'Registration failed. Please try again.';
          errorMsg.classList.add('visible');
          registerBtn.textContent = 'Create Account';
          registerBtn.disabled = false;
        }
      } catch (err) {
        errorMsg.textContent = 'Something went wrong. Please try again.';
        errorMsg.classList.add('visible');
        registerBtn.textContent = 'Create Account';
        registerBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
