<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - GeniusTestBoost</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="logo">
      <h1>GeniusTestBoost</h1>
      <p>Sign in to your account</p>
    </div>

    <div class="error-message" id="errorMsg"></div>

    <!-- Google Sign-In -->
    <a href="/api/auth/sign-in/social?provider=google&callbackURL=/dashboard" class="btn btn-google" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 18 18" style="margin-right:8px;vertical-align:middle">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      Continue with Google
    </a>

    <div class="auth-divider">
      <span>or sign in with email</span>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@school.edu" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="/register">Create one</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.remove('visible');
      loginBtn.textContent = 'Signing in...';
      loginBtn.disabled = true;

      try {
        const res = await fetch('/api/auth/sign-in/email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          }),
          credentials: 'include'
        });

        const result = await res.json();

        if (res.ok && result.token) {
          window.location.href = '/dashboard';
        } else {
          errorMsg.textContent = result.message || result.error || 'Invalid email or password';
          errorMsg.classList.add('visible');
          loginBtn.textContent = 'Sign In';
          loginBtn.disabled = false;
        }
      } catch (err) {
        errorMsg.textContent = 'Something went wrong. Please try again.';
        errorMsg.classList.add('visible');
        loginBtn.textContent = 'Sign In';
        loginBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
